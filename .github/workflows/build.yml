name: Build ClawBox

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Prepare server resources
        shell: bash
        run: |
          mkdir -p src-tauri/server/src src-tauri/server/public
          cp src/server.js src-tauri/server/src/
          cp -r public/* src-tauri/server/public/
          cp package.json src-tauri/server/
          cp -r node_modules src-tauri/server/

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build (cargo)
        shell: bash
        run: |
          cd src-tauri
          cargo build --release --target ${{ matrix.target }}

      - name: Build bundle (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd src-tauri
          cargo install tauri-cli 2>/dev/null || true
          cargo tauri build --target ${{ matrix.target }} 2>&1 || true

      - name: Build bundle (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd src-tauri
          cargo install tauri-cli 2>/dev/null || true
          cargo tauri build --target ${{ matrix.target }} 2>&1 || true

      - name: Build bundle (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd src-tauri
          cargo install tauri-cli 2>/dev/null || true
          cargo tauri build --target ${{ matrix.target }} 2>&1 || true

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: clawbox-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/clawbox
          if-no-files-found: warn

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: clawbox-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/clawbox
          if-no-files-found: warn

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: clawbox-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/clawbox.exe
          if-no-files-found: warn

name: Build ClawBox

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            bundle: deb,appimage
          - platform: ubuntu-22.04
            rust_target: aarch64-unknown-linux-gnu
            bundle: deb
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            bundle: dmg
          - platform: macos-13
            rust_target: x86_64-apple-darwin
            bundle: dmg
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundle: msi,nsis

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm ci || npm install

      - name: Prepare server resources
        shell: bash
        run: |
          mkdir -p src-tauri/server/src src-tauri/server/public
          cp src/server.js src-tauri/server/src/
          cp -r public/* src-tauri/server/public/
          cp package.json src-tauri/server/
          cp -r node_modules src-tauri/server/

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.rust_target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'ClawBox v__VERSION__'
          releaseBody: 'ClawBox Desktop App'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.rust_target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clawbox-${{ matrix.rust_target }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*.exe
          if-no-files-found: warn

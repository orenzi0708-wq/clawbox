name: Build ClawBox

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Linux (Ubuntu 22.04 container for wider compatibility)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace \
            ubuntu:22.04 bash -c '
            export DEBIAN_FRONTEND=noninteractive
            apt-get update && apt-get install -y \
              curl build-essential pkg-config \
              libwebkit2gtk-4.1-dev \
              libgtk-3-dev \
              libayatana-appindicator3-dev \
              librsvg2-dev \
              patchelf
            curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
            apt-get install -y nodejs
            curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source $HOME/.cargo/env
            set -e
            rustup target add x86_64-unknown-linux-gnu
            # Prepare server resources
            node scripts/prepare-tauri-server.js --install
            # Build
            cd src-tauri && cargo install tauri-cli && cargo tauri build --target x86_64-unknown-linux-gnu --bundles deb,rpm
          '

      - name: Build macOS/Windows
        if: runner.os != 'Linux'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ runner.os == 'macOS' && '-' || '' }}
        run: |
          set -e
          node scripts/prepare-tauri-server.js --install
          if [ "$RUNNER_OS" = "macOS" ]; then
            TAURI_TARGETS="dmg"
          else
            TAURI_TARGETS="msi,nsis"
          fi
          cargo install tauri-cli
          cargo tauri build --target ${{ matrix.target }} --bundles $TAURI_TARGETS

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: clawbox-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: warn

      - name: Create and upload source tarball (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p /tmp/clawbox-release
          tar czf /tmp/clawbox-release/clawbox-source.tar.gz \
            --exclude='src-tauri/target' \
            --exclude='src-tauri/gen' \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='clawbox-source.tar.gz' \
            --transform 's,^,clawbox/,' \
            .
          cp /tmp/clawbox-release/clawbox-source.tar.gz ./clawbox-source.tar.gz
        shell: bash

      - name: Upload source tarball
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: clawbox-source
          path: clawbox-source.tar.gz

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: clawbox-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
          if-no-files-found: warn

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: clawbox-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
          if-no-files-found: warn
# NOTE: macos-x64 (macos-13 Intel runner) is temporarily removed from main CI matrix.
# Reason: GitHub runner cancels the job immediately before any steps start.
# Re-enable after investigating Intel macOS runner availability/stability.
